version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mobicompare_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mobicompare

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mobicompare_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: mobicompare
      SECRET_KEY: change-this-in-production
      DEBUG: "false"
    depends_on:
      - mongodb
    volumes:
      - ./frontend:/app/frontend:ro

volumes:
  mongo_data:
